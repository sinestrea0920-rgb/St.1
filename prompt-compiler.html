<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prompt Compiler</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #080c14;
      --surface: #0d1321;
      --surface2: #111827;
      --border: #1e2d45;
      --accent: #00e5ff;
      --accent2: #7c3aed;
      --accent3: #f59e0b;
      --text: #e2e8f0;
      --muted: #64748b;
      --green: #10b981;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-family: 'Syne', sans-serif;
      padding: 24px 16px 60px;
      overflow-x: hidden;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0, 229, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 229, 255, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* Glow orbs */
    body::after {
      content: '';
      position: fixed;
      top: -200px;
      right: -200px;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(124, 58, 237, 0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 820px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    /* Header */
    header {
      margin-bottom: 40px;
      animation: fadeDown 0.6s ease both;
    }

    .logo-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }

    .logo-icon {
      width: 38px;
      height: 38px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    h1 {
      font-size: clamp(28px, 6vw, 42px);
      font-weight: 800;
      letter-spacing: -1px;
      background: linear-gradient(90deg, #fff 0%, var(--accent) 60%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: var(--muted);
      font-size: 14px;
      letter-spacing: 0.5px;
      font-family: 'Space Mono', monospace;
    }

    /* Main card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px;
      margin-bottom: 20px;
      animation: fadeUp 0.5s ease both;
    }

    .card:nth-child(2) { animation-delay: 0.1s; }
    .card:nth-child(3) { animation-delay: 0.2s; }

    .card-label {
      font-size: 11px;
      font-family: 'Space Mono', monospace;
      color: var(--accent);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    textarea {
      width: 100%;
      min-height: 140px;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 12px;
      padding: 16px;
      font-size: 15px;
      font-family: 'Syne', sans-serif;
      resize: vertical;
      transition: border-color 0.2s;
      outline: none;
      line-height: 1.6;
    }

    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0, 229, 255, 0.08);
    }

    textarea::placeholder { color: var(--muted); }

    /* Controls */
    .controls-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 16px;
    }

    @media (max-width: 560px) {
      .controls-grid { grid-template-columns: 1fr; }
    }

    .select-wrap {
      position: relative;
    }

    .select-label {
      font-size: 10px;
      font-family: 'Space Mono', monospace;
      color: var(--muted);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    select {
      width: 100%;
      appearance: none;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 36px 12px 14px;
      font-size: 14px;
      font-family: 'Syne', sans-serif;
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s;
    }

    select:focus { border-color: var(--accent); }

    .select-arrow {
      position: absolute;
      right: 12px;
      bottom: 13px;
      width: 14px;
      height: 14px;
      pointer-events: none;
      color: var(--muted);
    }

    /* Generate button */
    .btn-generate {
      width: 100%;
      padding: 18px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #0ea5e9, var(--accent2));
      color: white;
      font-size: 15px;
      font-weight: 700;
      font-family: 'Syne', sans-serif;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.25s;
      position: relative;
      overflow: hidden;
      margin-top: 20px;
    }

    .btn-generate::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.12), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .btn-generate:hover::before { opacity: 1; }
    .btn-generate:hover { transform: translateY(-1px); box-shadow: 0 8px 30px rgba(14, 165, 233, 0.3); }
    .btn-generate:active { transform: translateY(0); }

    .btn-generate.loading {
      pointer-events: none;
      opacity: 0.7;
    }

    /* Output */
    .output-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px;
      animation: fadeUp 0.5s ease both;
      animation-delay: 0.25s;
    }

    .output-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .model-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(0, 229, 255, 0.08);
      border: 1px solid rgba(0, 229, 255, 0.2);
      color: var(--accent);
      padding: 5px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-family: 'Space Mono', monospace;
    }

    .model-badge::before {
      content: '';
      display: block;
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--accent);
      animation: pulse 2s infinite;
    }

    .prompt-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      min-height: 140px;
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      line-height: 1.8;
      color: #a5f3fc;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .prompt-box.empty { color: var(--muted); font-style: italic; }

    .btn-copy {
      margin-top: 16px;
      width: 100%;
      padding: 14px;
      border: 1px solid var(--green);
      border-radius: 12px;
      background: rgba(16, 185, 129, 0.08);
      color: var(--green);
      font-size: 14px;
      font-weight: 700;
      font-family: 'Syne', sans-serif;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-copy:hover {
      background: rgba(16, 185, 129, 0.15);
      box-shadow: 0 0 20px rgba(16, 185, 129, 0.2);
    }

    .btn-copy.copied {
      border-color: var(--accent3);
      color: var(--accent3);
      background: rgba(245, 158, 11, 0.08);
    }

    /* Spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1e293b;
      border: 1px solid var(--green);
      color: var(--green);
      padding: 12px 24px;
      border-radius: 999px;
      font-size: 13px;
      font-family: 'Space Mono', monospace;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      z-index: 100;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

<div class="container">

  <header>
    <div class="logo-row">
      <div class="logo-icon">⚡</div>
      <h1>Prompt Compiler</h1>
    </div>
    <div class="subtitle">// 將你的想法轉換成高品質 AI Prompt</div>
  </header>

  <!-- Input Card -->
  <div class="card">
    <div class="card-label">輸入你的靈感</div>
    <textarea id="ideaInput" placeholder="例如：一個在雨中奔跑的女生，電影感，夜晚街道，霓虹燈反光..."></textarea>

    <div class="controls-grid">
      <div class="select-wrap">
        <div class="select-label">視覺風格</div>
        <select id="styleSelect">
          <option value="cinematic">🎬 電影感</option>
          <option value="realistic">📷 寫實</option>
          <option value="anime">✨ 動漫</option>
          <option value="minimal">◻️ 極簡</option>
        </select>
        <svg class="select-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </div>

      <div class="select-wrap">
        <div class="select-label">畫面比例</div>
        <select id="ratioSelect">
          <option value="1:1">⬜ 1:1 正方</option>
          <option value="16:9">▬ 16:9 橫向</option>
          <option value="9:16">▮ 9:16 直向</option>
          <option value="4:3">▭ 4:3 標準</option>
        </select>
        <svg class="select-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </div>

      <div class="select-wrap">
        <div class="select-label">目標模型</div>
        <select id="modelSelect">
          <option value="image">🖼 Image Gen</option>
          <option value="sora">🎥 Sora</option>
          <option value="seedance">💃 Seedance</option>
          <option value="midjourney">🌀 Midjourney</option>
        </select>
        <svg class="select-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
    </div>

    <button class="btn-generate" id="generateBtn" onclick="generatePrompt()">
      ⚡ 生成 Prompt
    </button>
  </div>

  <!-- Output Card -->
  <div class="output-card">
    <div class="output-header">
      <div class="card-label" style="margin-bottom:0">輸出結果</div>
      <div class="model-badge" id="modelBadge">Model: image</div>
    </div>

    <div class="prompt-box empty" id="promptBox">等待輸入想法並點擊生成...</div>

    <button class="btn-copy" id="copyBtn" onclick="copyPrompt()">
      ⎘ 複製 Prompt
    </button>
  </div>

</div>

<div class="toast" id="toast">✓ Prompt 已複製到剪貼簿</div>

<script>
  const styleMap = {
    cinematic: "cinematic lighting, dramatic shadows, anamorphic lens, movie still, color grading, golden hour or neon-lit scene, depth of field",
    realistic: "ultra-realistic, photorealistic, 8K resolution, highly detailed textures, natural lighting, DSLR photography",
    anime: "anime style, vibrant color palette, clean lineart, cel shading, detailed background, Studio Ghibli or KyoAni inspired",
    minimal: "minimalist composition, clean aesthetic, negative space, monochromatic tones, geometric simplicity, Scandinavian design"
  };

  const modelExtra = {
    sora: "\ncamera movement: slow dolly in,\ncinematic motion blur,\nsmooth scene transition,\n24fps film grain",
    seedance: "\ndynamic movement,\nvisual rhythm and energy,\nanimated atmosphere,\nfluid character motion",
    midjourney: "\n--ar {ratio} --style raw --q 2 --v 6.1"
  };

  function generatePrompt() {
    const idea = document.getElementById("ideaInput").value.trim();
    const style = document.getElementById("styleSelect").value;
    const ratio = document.getElementById("ratioSelect").value;
    const model = document.getElementById("modelSelect").value;

    if (!idea) {
      document.getElementById("ideaInput").focus();
      document.getElementById("ideaInput").style.borderColor = "#ef4444";
      setTimeout(() => {
        document.getElementById("ideaInput").style.borderColor = "";
      }, 1200);
      return;
    }

    const btn = document.getElementById("generateBtn");
    btn.innerHTML = '<span class="spinner"></span>生成中...';
    btn.classList.add("loading");

    document.getElementById("modelBadge").textContent = "Model: " + model;

    setTimeout(() => {
      const styleDesc = styleMap[style] || "";
      let extra = modelExtra[model] || "";

      if (model === "midjourney") {
        extra = extra.replace("{ratio}", ratio);
      }

      let prompt = `${idea},

${styleDesc},

high quality, ultra detailed,
professional composition,
masterpiece,
aspect ratio ${ratio}${extra}`;

      const box = document.getElementById("promptBox");
      box.textContent = prompt;
      box.classList.remove("empty");

      btn.innerHTML = "⚡ 生成 Prompt";
      btn.classList.remove("loading");
    }, 600);
  }

  function copyPrompt() {
    const text = document.getElementById("promptBox").textContent;
    if (!text || text.includes("等待")) return;

    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById("copyBtn");
      btn.textContent = "✓ 已複製！";
      btn.classList.add("copied");

      const toast = document.getElementById("toast");
      toast.classList.add("show");

      setTimeout(() => {
        btn.textContent = "⎘ 複製 Prompt";
        btn.classList.remove("copied");
        toast.classList.remove("show");
      }, 2200);
    });
  }

  document.getElementById("ideaInput").addEventListener("keydown", function(e) {
    if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) {
      generatePrompt();
    }
  });
</script>

</body>
</html>
